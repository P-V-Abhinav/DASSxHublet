services:
  - type: web
    name: hublet-backend
    runtime: node
    rootDir: src/backend
    buildCommand: |
      npm install
      npx prisma generate
      npx prisma migrate deploy
      python3 -m venv .venv
      .venv/bin/pip install --upgrade pip
      .venv/bin/pip install -r scraper/requirements.txt
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./dev.db
      - key: PYTHON_PATH
        value: python3
      # Set these manually in the Render dashboard (secret values):
      # APIFY_TOKEN, ZENROWS_API_KEY, MONGODB_URI, MONGODB_DB_NAME, CORS_ORIGIN, API_BASE_URL
